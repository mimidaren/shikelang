<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>屎壳郎黄金军团 | 官方门户网站 V6</title>
    <style>
        :root {
            --poop-yellow: #B8860B;
            --poop-light: #DAA520;
            --poop-dark: #8B6508;
            --beetle-brown: #6B3410;
            --beetle-brown-light: #8B4513;
            --earth-1: #2a1a0e;
            --earth-2: #1a0f08;
            --card-bg: #1A1A1A;
            --text-light: #F0F0F0;
            --text-dim: #BBBBBB;
            --red-alert: #CC0000;
        }

        * { box-sizing: border-box; }

        html, body { overflow-x: hidden; scroll-behavior: smooth; }

        body {
            color: var(--text-light);
            font-family: 'Microsoft YaHei', sans-serif;
            margin: 0;
            line-height: 1.6;
            position: relative;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(184, 134, 11, 0.18), transparent 55%),
                radial-gradient(ellipse at 85% 35%, rgba(139, 69, 19, 0.22), transparent 50%),
                radial-gradient(ellipse at 30% 80%, rgba(218, 165, 32, 0.12), transparent 60%),
                linear-gradient(160deg, #1a0f08 0%, #0d0703 40%, #1a0f08 70%, #2a1a0e 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* -------------------------------------------------------------------------- */
        /* 背景与装饰动画 */
        /* -------------------------------------------------------------------------- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle at 12% 18%, rgba(255, 200, 100, 0.05) 0 1px, transparent 2px),
                radial-gradient(circle at 78% 33%, rgba(255, 200, 100, 0.06) 0 1px, transparent 2px),
                radial-gradient(circle at 35% 70%, rgba(255, 200, 100, 0.04) 0 1px, transparent 2px),
                radial-gradient(circle at 90% 85%, rgba(255, 200, 100, 0.05) 0 1px, transparent 2px);
            background-size: 80px 80px, 110px 110px, 130px 130px, 95px 95px;
            opacity: 0.9;
            z-index: 0;
        }

        .floating-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .orb {
            position: absolute; width: 60px; height: 60px; border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #8B5A2B, #4a2810 70%, #2a1408);
            box-shadow: inset -6px -8px 12px rgba(0,0,0,0.55), 0 4px 12px rgba(0,0,0,0.4);
            opacity: 0.45;
        }
        .orb.o1 { left: 5%; top: 15%; animation: float1 18s infinite; }
        .orb.o2 { right: 8%; top: 50%; animation: float2 22s infinite; }
        @keyframes float1 { 50% { transform: translate(40px, -30px); } }
        @keyframes float2 { 50% { transform: translate(-50px, 40px); } }

        /* -------------------------------------------------------------------------- */
        /* 核心导航与通报 */
        /* -------------------------------------------------------------------------- */
        nav {
            background: rgba(15, 10, 5, 0.92);
            backdrop-filter: blur(8px);
            border-bottom: 3px solid var(--poop-yellow);
            padding: 0.7rem 5%;
            position: sticky; top: 0;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(184, 134, 11, 0.25);
        }
        .nav-logo { display: flex; align-items: center; gap: 0.9rem; color: var(--poop-yellow); font-weight: 900; }
        .nav-logo .badge { width: 56px; height: 56px; border-radius: 50%; box-shadow: 0 0 14px var(--poop-light); }
        .news-ticker { background: var(--red-alert); color: #FFF; padding: 8px 0; overflow: hidden; white-space: nowrap; font-weight: bold; }
        .ticker-content { display: inline-block; padding-left: 100%; animation: ticker 25s linear infinite; }
        @keyframes ticker { 100% { transform: translate(-100%, 0); } }

        /* -------------------------------------------------------------------------- */
        /* 页面主体 */
        /* -------------------------------------------------------------------------- */
        .container { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem; z-index: 5; position: relative; }
        .section-title h2 { text-align: center; color: var(--poop-yellow); font-size: 2.2rem; }
        .intro-box { background: rgba(26, 15, 8, 0.95); border-left: 8px solid var(--poop-yellow); padding: 2.5rem; border-radius: 8px; }
        .roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; margin-top: 2rem; }
        
        .person-card { 
            background: rgba(30, 30, 30, 0.95); border: 2px solid #333; border-radius: 10px; 
            overflow: hidden; transition: 0.3s; position: relative;
        }
        .person-card:hover { transform: translateY(-8px); border-color: var(--poop-yellow); }
        .portrait-container img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-bottom: 2px solid var(--poop-yellow); }
        .card-info { padding: 1.5rem; }
        .person-name { font-size: 1.8rem; margin: 0; }
        .exam-tag { position: absolute; top: 10px; right: 10px; background: var(--red-alert); padding: 4px 10px; font-weight: bold; transform: rotate(5deg); }

        /* -------------------------------------------------------------------------- */
        /* 新功能：右下角资讯弹窗与图片模态框 */
        /* -------------------------------------------------------------------------- */
        
        /* 1. 悬浮通知气泡 */
        #news-bubble {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--poop-yellow);
            color: #000;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            z-index: 2000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s, background 0.3s;
            animation: pulse-border 2s infinite;
        }

        #news-bubble:hover {
            transform: scale(1.1);
            background: var(--poop-light);
        }

        /* 闪烁的小红点 */
        .red-dot {
            width: 10px;
            height: 10px;
            background: red;
            border-radius: 50%;
            display: inline-block;
            animation: blink 0.8s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(184, 134, 11, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(184, 134, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(184, 134, 11, 0); }
        }

        /* 2. 资讯详情模态框 */
        #info-modal {
            display: none; /* 默认隐藏 */
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: var(--earth-2);
            border: 3px solid var(--poop-yellow);
            max-width: 800px;
            width: 100%;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* 关闭按钮 */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--poop-yellow);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            z-index: 3010;
            transition: background 0.3s, transform 0.2s;
            border: 1px solid var(--poop-yellow);
        }
        .close-btn:hover { background: var(--poop-yellow); color: #000; transform: rotate(90deg); }

        /* 图片样式 */
        .modal-img {
            width: 100%;
            display: block;
            border-bottom: 2px solid var(--poop-yellow);
        }

        /* 文字说明区 */
        .modal-caption {
            padding: 20px;
            background: linear-gradient(180deg, #1a0f08, #000);
            border-top: 5px solid var(--poop-yellow);
        }
        .modal-caption h3 {
            color: var(--poop-yellow);
            margin-top: 0;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 2px;
        }
        .modal-caption p {
            color: var(--text-light);
            font-size: 1.1rem;
            line-height: 1.8;
            margin: 0;
            text-indent: 2em;
        }

        footer { padding: 3rem 2rem; text-align: center; background: #050505; color: var(--text-dim); }
    </style>
</head>
<body>

<!-- 漂浮粪球 -->
<div class="floating-orbs" aria-hidden="true">
    <div class="orb o1"></div>
    <div class="orb o2"></div>
</div>

<nav>
    <div class="nav-logo">
        <img class="badge" src="团徽.jpg" alt="团徽">
        <span>屎壳郎黄金军团</span>
    </div>
    <div class="nav-links">
        <a href="#about">军团概况</a>
        <a href="#roster">核心干部</a>
    </div>
</nav>

<div class="news-ticker">
    <div class="ticker-content">
        🔥🔥🔥 【司令部急电】全军官兵务必关注最新防务部署情报！ 🔥🔥🔥
    </div>
</div>

<div class="container">
    <div class="intro-box">
        <p><strong>军团宣言：</strong>我等生于粪土，志在黄金！以粪为甲，虽远必滚！</p>
    </div>

    <!-- 干部花名册简版 -->
    <div class="roster-grid" id="roster">
        <div class="person-card">
            <div class="portrait-container"><img src="图片1.jpg.png" alt="了知意"></div>
            <div class="card-info">
                <div class="role-title">司令官</div>
                <h3 class="person-name">了知意</h3>
            </div>
        </div>
        <div class="person-card">
            <div class="portrait-container"><img src="图片10.jpg.png" alt="风韫丛"></div>
            <div class="card-info">
                <div class="role-title">军团长</div>
                <h3 class="person-name">风韫丛</h3>
            </div>
        </div>
    </div>
</div>

<!-- 右下角通知弹窗按钮 -->
<div id="news-bubble" onclick="openModal()">
    <span class="red-dot"></span>
    <span>最新情报：司令部高层会晤</span>
</div>

<!-- 全屏资讯弹窗 -->
<div id="info-modal">
    <div class="modal-content">
        <div class="close-btn" onclick="closeModal()">×</div>
        <img src="情侣合照.jpg" alt="最高领导人会晤" class="modal-img">
        <div class="modal-caption">
            <h3>【军事情报 · 绝密通报】</h3>
            <p>
                屎壳郎军团司令官与军团长正式会晤。在此次历史性会谈中，两位最高领导人同框合影，共商军团防务与阵营部署事宜，
                旨在巩固黄金防线，确保军团在下一阶段的全球滚动征途中立于不败之地。全军务必紧密团结在以司令官为核心的领导层周围！
            </p>
        </div>
    </div>
</div>

<footer>
    <div>© 屎壳郎黄金军团 · 司令部宣传处</div>
</footer>

<script>
    const modal = document.getElementById('info-modal');

    // 打开弹窗
    function openModal() {
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden'; // 禁止页面滚动
    }

    // 关闭弹窗
    function closeModal() {
        modal.style.display = 'none';
        document.body.style.overflow = 'auto'; // 恢复页面滚动
    }

    // 点击背景也能关闭
    window.onclick = function(event) {
        if (event.target == modal) {
            closeModal();
        }
    }
</script>

</body>
</html>
