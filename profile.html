<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>军团绝密档案系统 | 屎壳郎黄金军团</title>
    <style>
        :root {
            --g-red: #CC0000;
            --g-yellow: #B8860B;
            --g-gold: #FFD700;
            --bg-dark: #050505;
        }

        body { 
            background: radial-gradient(ellipse at 20% 0%, rgba(184, 134, 11, 0.15), transparent 55%), radial-gradient(ellipse at 85% 35%, rgba(139, 69, 19, 0.15), transparent 50%), var(--bg-dark);
            color: #ccc; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; margin: 0; padding: 0; overflow-x: hidden; min-height: 100vh;
        }

        /* 顶部系统导航 */
        .nav-top { 
            padding: 20px 40px; border-bottom: 1px solid rgba(255,215,0,0.2); display: flex; justify-content: space-between; align-items: center; 
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }
        .nav-top a { color: var(--g-gold); text-decoration: none; font-weight: bold; letter-spacing: 2px; transition: 0.3s; display: flex; align-items: center; gap: 8px;}
        .nav-top a:hover { text-shadow: 0 0 10px var(--g-gold); transform: translateX(-5px); }
        .nav-sys-name { color: #888; font-family: monospace; letter-spacing: 3px; font-size: 0.9rem;}

        /* 背景绝密水印 */
        .watermark {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 15vw; color: rgba(200, 0, 0, 0.03); font-weight: 900; white-space: nowrap; pointer-events: none; z-index: 0; user-select: none;
        }

        /* 档案主体架构 */
        .dossier-wrapper { max-width: 1200px; margin: 40px auto; display: grid; grid-template-columns: 350px 1fr; gap: 40px; padding: 0 20px; position: relative; z-index: 10; }
        
        /* 左侧：影像与基础身份 */
        .left-panel { display: flex; flex-direction: column; gap: 20px; }
        
        .photo-frame { position: relative; border: 1px solid rgba(255,255,255,0.1); padding: 15px; background: rgba(15,15,15,0.8); box-shadow: 0 15px 30px rgba(0,0,0,0.6); }
        /* 军方瞄准框效果 */
        .photo-frame::before, .photo-frame::after { content:''; position: absolute; width: 30px; height: 30px; border: 3px solid var(--g-gold); transition: 0.3s;}
        .photo-frame::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .photo-frame::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }
        
        .photo-frame img { width: 100%; aspect-ratio: 1/1; object-fit: cover; filter: contrast(1.1) grayscale(20%); border-bottom: 2px solid var(--g-gold); }
        .exam-tag { position: absolute; top: 20px; right: 20px; background: rgba(204,0,0,0.9); color: #fff; padding: 5px 12px; font-size: 0.8rem; font-weight: bold; border: 1px solid #fff; transform: rotate(5deg); display: none; }

        .base-info-box { background: rgba(20, 15, 10, 0.7); border: 1px solid rgba(218, 165, 32, 0.2); padding: 25px; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .f-name { font-size: 2.5rem; color: #fff; margin: 0 0 5px 0; font-weight: 300; letter-spacing: 2px; }
        .f-role { color: var(--g-gold); font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; letter-spacing: 1px; }
        .secret-badge { display: inline-block; padding: 6px 15px; font-weight: bold; letter-spacing: 4px; border-radius: 4px; border: 1px solid; margin-bottom: 15px;}
        .secret-red { background: rgba(204,0,0,0.1); color: #FF4444; border-color: #CC0000; box-shadow: 0 0 15px rgba(204,0,0,0.4); animation: pulseRed 2s infinite; }
        .secret-yellow { background: rgba(184,134,11,0.1); color: var(--g-gold); border-color: var(--g-yellow); box-shadow: 0 0 15px rgba(184,134,11,0.4); }
        
        @keyframes pulseRed { 0%, 100% { box-shadow: 0 0 15px rgba(204,0,0,0.4); } 50% { box-shadow: 0 0 25px rgba(204,0,0,0.8); } }

        .meta-data { font-family: monospace; font-size: 0.9rem; color: #888; display: flex; flex-direction: column; gap: 8px; border-top: 1px dashed #333; padding-top: 15px;}
        .meta-data span { display: flex; justify-content: space-between; }
        .meta-data strong { color: #BBB; }

        /* 右侧：详细情报 */
        .right-panel { display: flex; flex-direction: column; gap: 25px; }
        .section-box { 
            background: rgba(15, 15, 15, 0.8); border-left: 4px solid var(--g-yellow); padding: 30px; 
            border-radius: 4px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            opacity: 0; transform: translateY(30px); transition: 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); 
        }
        .section-box.active { opacity: 1; transform: translateY(0); }
        .section-title { color: var(--g-gold); font-size: 1.5rem; margin: 0 0 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; font-family: "KaiTi", serif; letter-spacing: 2px;}
        
        .info-grid { display: grid; grid-template-columns: 100px 1fr; gap: 15px 20px; line-height: 1.6; }
        .info-label { color: #888; font-weight: bold; }
        .info-value { color: #E0E0E0; font-size: 1.05rem;}

        .section-list { list-style: none; padding: 0; margin: 0; }
        .section-list li { position: relative; padding-left: 25px; margin-bottom: 15px; line-height: 1.8; color: #CCC; font-size: 1.05rem; }
        .section-list li::before { content: '>'; position: absolute; left: 0; top: 2px; color: var(--g-yellow); font-family: monospace; font-weight: bold; font-size: 1.2rem;}

        /* 公章系统 */
        .stamp-wrapper { display: flex; flex-direction: column; align-items: flex-end; margin-top: 30px; padding-right: 20px;}
        .stamp { 
            border: 4px solid #C00; border-radius: 8px; color: #C00; padding: 15px 25px; 
            font-family: 'SimHei', sans-serif; font-size: 1.4rem; font-weight: bold; 
            transform: rotate(-10deg); text-align: center; line-height: 1.4; opacity: 0.85; 
            filter: drop-shadow(0 0 5px rgba(200,0,0,0.3)); letter-spacing: 2px;
        }
        .stamp-date { color: #888; font-family: monospace; margin-top: 20px; transform: translateX(-30px); font-size: 1.1rem;}

        .error-box { text-align: center; margin: 100px auto; color: var(--g-red); font-size: 1.5rem; }

        @media (max-width: 900px) {
            .dossier-wrapper { grid-template-columns: 1fr; }
            .watermark { font-size: 25vw; }
        }
    </style>
</head>

    document.addEventListener("DOMContentLoaded", () => {
        // 解析 URL 中的 ID (例如: profile.html?id=1)
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const data = db[id];

        // 如果没有匹配的ID，显示报错信息
        if (!data) {
            document.getElementById('dossier-app').innerHTML = `
                <div class="error-box">
                    <h2>⚠️ 访问被拒绝</h2>
                    <p>系统未检测到有效授权，或目标档案不存在。</p>
                    <a href="index.html" style="color:#FFD700; text-decoration:underline;">[点击返回主页面]</a>
                </div>`;
            return;
        }

        // 填充数据：左侧面板
        document.getElementById('img-src').src = data.img;
        document.getElementById('f-name').innerText = data.name;
        document.getElementById('f-role').innerText = data.role;
        document.getElementById('f-docNo').innerText = data.docNo;
        
        const secEl = document.getElementById('f-secret');
        secEl.innerText = '密级：' + data.secret;
        if(data.secret === '绝密') secEl.classList.add('secret-red');
        else secEl.classList.add('secret-yellow');

        if(data.tag) {
            const tagEl = document.getElementById('f-tag');
            tagEl.innerText = data.tag;
            tagEl.style.display = 'inline-block';
        }

        // 填充数据：右侧面板
        document.getElementById('f-dept').innerText = data.dept;
        document.getElementById('f-position').innerText = data.position;
        document.getElementById('auth-title').innerText = data.authTitle;

        // 生成列表函数
        const buildList = arr => arr.map(text => `<li>${text}</li>`).join('');
        document.getElementById('list-duty').innerHTML = buildList(data.duty);
        document.getElementById('list-auth').innerHTML = buildList(data.auth);
        document.getElementById('list-req').innerHTML = buildList(data.req);

        // 高级动画：让模块依次浮现
        setTimeout(() => {
            document.querySelectorAll('.reveal-anim').forEach((el, index) => {
                setTimeout(() => { el.classList.add('active'); }, index * 120);
            });
        }, 100);
    });
